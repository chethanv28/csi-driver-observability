apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: csi-driver-monitoring
  labels:
    app: prometheus
    app.kubernetes.io/part-of: csi-driver-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: csi-observability-prometheus
  labels:
    app: prometheus
    app.kubernetes.io/part-of: csi-driver-observability
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csi-observability-prometheus
  labels:
    app: prometheus
    app.kubernetes.io/part-of: csi-driver-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: csi-observability-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: csi-driver-monitoring
