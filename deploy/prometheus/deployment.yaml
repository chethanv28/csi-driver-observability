apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: csi-driver-monitoring
  labels:
    app: prometheus
    app.kubernetes.io/part-of: csi-driver-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/part-of: csi-driver-observability
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - name: web
              containerPort: 9090
          readinessProbe:
            httpGet: { path: /-/ready,   port: web }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: web }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: "1",  memory: 2Gi  }
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - { key: prometheus.yml, path: prometheus.yml }
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - { key: rules.yml, path: rules.yml }
        # Replace emptyDir with a PersistentVolumeClaim for production
        - name: storage
          emptyDir: {}
