apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: csi-driver-monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: csi-driver-observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: csi-driver-observability
        orgId: 1
        folder: CSI Driver Observability
        folderUid: csi-driver-observability
        type: file
        disableDeletion: true
        editable: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
