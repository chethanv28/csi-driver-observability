apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: csi-driver-monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: csi-driver-observability
spec:
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300   # http://<node-ip>:30300
  selector:
    app: grafana
